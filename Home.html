<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Главная</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    overflow:hidden;
}

.video-bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.6);
    z-index:-1;
}

header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:#00ff66;
    font-size:32px;
    font-weight:bold;
}

.menu a{
    color:white;
    text-decoration:none;
    margin:0 15px;
}

.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.hero h1{
    font-size:70px;
    margin-bottom:20px;
}

.hero p{
    font-size:22px;
    margin-bottom:30px;
}

.btn{
    background:#00ff66;
    color:black;
    padding:15px 35px;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>
<body>

<video autoplay muted loop class="video-bg">
    <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<header>
    <div class="logo">PANDOR SHOP от LilYolDi</div>

    <div class="menu">
        <a href="Home.html">Главная</a>
        <a href="info.html">О магазине</a>
        <a href="contacts.html">Поддержка</a>
    </div>
</header>

<div class="hero">
    <h1>Добро пожаловать</h1>
    <p>Лучший магазин товаров</p>
    <a href="index.html" class="btn">Перейти к товарам</a>
</div>

</body>
</html>
