<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Тех поддержка</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    background:#00ff66;
    color:#000;
    text-align:center;
    padding:20px;
    font-size:30px;
    font-weight:bold;
}

.support{
    max-width:500px;
    margin:40px auto;
    background:#111;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 25px #00ff66;
}

h2{
    text-align:center;
    color:#00ff66;
}

input, textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    background:#000;
    color:white;
    border:2px solid #00ff66;
    border-radius:8px;
    box-sizing:border-box;
}

textarea{
    height:120px;
}

button{
    width:100%;
    padding:14px;
    background:#00ff66;
    color:#000;
    border:none;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 20px #00ff66;
}

button:hover{
    background:white;
}

footer{
    text-align:center;
    margin-top:30px;
    color:#777;
}
</style>

</head>

<body>

<header>
ТЕХ ПОДДЕРЖКА
</header>


<div class="support">

<h2>Связаться с нами</h2>

<form action= "lilyoldi13@gmail.com" method="post" enctype="text/plain">

<input type="text" name="name" placeholder="Ваше имя">

<input type="email" name="email" placeholder="Ваша почта">

<textarea name="message" placeholder="Опишите проблему"></textarea>

<button type="submit">
Отправить
</button>

<button type="button"
        onclick="location.href='index.html'"
        style="margin-top:15px;">
    Перейти к товарам
</button>


<footer>
© 2026 Support
</footer>

</body>
</html>
