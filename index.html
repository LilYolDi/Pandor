<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GREEN SHOP</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="menu" class="menu">

    <span class="close" onclick="closeMenu()">✖️</span>

    <h2>PANDOR SHOP</h2>

    <a href="Home.html">Главная</a>
    <a href="#">Категории</a>
    <a href="#">О Магазине</a>
    <a href="#">Тех.поддержка</a>

</div>

<header>
🛒 PANDOR SHOP
<button class="menu-btn" onclick="openMenu()">☰ Меню</button>
</header>

<div class="search">
<input id="search" placeholder="Поиск товара">
</div>

<div class="products" id="products"></div>

<!-- 🔥 КНОПКА -->
<button class="add-btn" onclick="openForm()">
Подать объявление
</button>

<!-- 🔥 ВСПЛЫВАЮЩАЯ ФОРМА -->
<div id="popup" class="popup">

  <div class="popup-content">

    <span class="close" onclick="closeForm()">✖️</span>

    <h2>Добавить товар</h2>

    <form action="https://formspree.io/f/mbdvgqqn" method="POST" enctype="multipart/form-data">

      <input type="text" name="title" placeholder="Название товара" required>

      <textarea name="description" placeholder="Описание товара" required></textarea>

      <input type="file" name="photo" accept="image/*" required>

      <button type="submit">Отправить</button>

    </form>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
